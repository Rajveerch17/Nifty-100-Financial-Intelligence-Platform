# Screener Configuration - All Thresholds & Presets
# Analyst-editable file. No code changes needed to add new screening presets.
# All monetary values in ■ Crore unless stated

# ============================================================================
# FILTER DEFINITIONS - 15 Metrics
# ============================================================================
filters:
  roe_min:
    column: return_on_equity_pct
    operator: ">="
    description: "Return on Equity minimum threshold (%)"
    default: 12
    
  roce_min:
    column: return_on_capital_employed_pct
    operator: ">="
    description: "Return on Capital Employed minimum (%)"
    default: 12

  opm_min:
    column: operating_profit_margin_pct
    operator: ">="
    description: "Operating Profit Margin minimum (%)"
    default: 10

  npm_min:
    column: net_profit_margin_pct
    operator: ">="
    description: "Net Profit Margin minimum (%)"
    default: 5

  de_max:
    column: debt_to_equity
    operator: "<="
    description: "Debt-to-Equity maximum ratio"
    default: 1.0
    sector_carve_out: ["Financials"]  # Skip D/E filter for banks/NBFCs

  fcf_min:
    column: free_cash_flow_cr
    operator: ">"
    description: "Free Cash Flow minimum (■ Crore)"
    default: 100

  fcf_cagr_5yr_min:
    column: fcf_cagr_5yr
    operator: ">="
    description: "FCF CAGR 5-year minimum (%)"
    default: 10

  revenue_cagr_5yr_min:
    column: revenue_cagr_5yr
    operator: ">="
    description: "Revenue CAGR 5-year minimum (%)"
    default: 10

  pat_cagr_5yr_min:
    column: pat_cagr_5yr
    operator: ">="
    description: "PAT CAGR 5-year minimum (%)"
    default: 12

  pe_max:
    column: pe_ratio
    operator: "<="
    description: "Price-to-Earnings maximum multiple (×)"
    default: 25

  pb_max:
    column: pb_ratio
    operator: "<="
    description: "Price-to-Book maximum multiple (×)"
    default: 5

  dividend_yield_min:
    column: dividend_yield_pct
    operator: ">="
    description: "Dividend Yield minimum (%)"
    default: 2.0

  icr_min:
    column: interest_coverage
    operator: ">="
    description: "Interest Coverage Ratio minimum (×)"
    default: 3.0
    special_handling: "debt_free_infinity"  # Treat debt-free companies as infinity

  market_cap_min:
    column: market_cap_crore
    operator: ">="
    description: "Market Cap minimum (■ Crore)"
    default: 5000

  asset_turnover_min:
    column: asset_turnover
    operator: ">="
    description: "Asset Turnover minimum (×)"
    default: 0.5

# ============================================================================
# COMPOSITE QUALITY SCORE WEIGHTS & NORMALIZATION
# ============================================================================
composite_score:
  enabled: true
  scale: [0, 100]
  normalization: "winsorise_p10_p90"
  
  dimensions:
    profitability:
      weight: 0.35
      metrics:
        - {name: "return_on_equity_pct", weight: 0.15}
        - {name: "return_on_capital_employed_pct", weight: 0.10}
        - {name: "net_profit_margin_pct", weight: 0.10}
    
    cash_quality:
      weight: 0.30
      metrics:
        - {name: "fcf_cagr_5yr", weight: 0.15}
        - {name: "cfo_pat_ratio", weight: 0.10}
        - {name: "fcf_positive_flag", weight: 0.05}
    
    growth:
      weight: 0.20
      metrics:
        - {name: "revenue_cagr_5yr", weight: 0.10}
        - {name: "pat_cagr_5yr", weight: 0.10}
    
    leverage:
      weight: 0.15
      metrics:
        - {name: "debt_to_equity_score", weight: 0.10}
        - {name: "interest_coverage_score", weight: 0.05}

# ============================================================================
# 6 PRESET SCREENERS
# ============================================================================
presets:
  
  quality_compounder:
    display_name: "Quality Compounder"
    description: "High profitability, strong FCF, low debt, consistent growth"
    target_count: "15-35 companies"
    ranking_metric: "composite_quality_score"
    ranking_order: "descending"
    filters:
      roe_min: 15
      de_max: 1.0
      fcf_min: 100
      revenue_cagr_5yr_min: 10
    business_logic: |
      Identifies quality growth companies with:
      - Sustained ROE > 15% (proven capital efficiency)
      - D/E < 1.0 (conservative leverage)
      - Positive FCF (cash-generative)
      - Revenue CAGR > 10% (organic growth)

  value_pick:
    display_name: "Value Pick"
    description: "Attractive valuations, profitability, dividend yield"
    target_count: "10-25 companies"
    ranking_metric: "composite_quality_score"
    ranking_order: "descending"
    filters:
      pe_max: 20
      pb_max: 3.0
      de_max: 2.0
      dividend_yield_min: 1.0
    business_logic: |
      Identifies undervalued mature companies:
      - P/E < 20× (below Nifty 100 median)
      - P/B < 3.0 (reasonable premium to book)
      - D/E < 2.0 (moderate debt)
      - Dividend Yield > 1% (capital return)

  growth_accelerator:
    display_name: "Growth Accelerator"
    description: "High earnings and revenue growth, strong momentum"
    target_count: "8-20 companies"
    ranking_metric: "pat_cagr_5yr"
    ranking_order: "descending"
    filters:
      pat_cagr_5yr_min: 20
      revenue_cagr_5yr_min: 15
      de_max: 2.0
    business_logic: |
      Identifies fast-growing companies:
      - PAT CAGR > 20% (exceptional earnings growth)
      - Revenue CAGR > 15% (supporting top-line growth)
      - D/E < 2.0 (debt controlled despite growth investments)

  dividend_champion:
    display_name: "Dividend Champion"
    description: "High dividend yield with sustainable payout"
    target_count: "10-20 companies"
    ranking_metric: "dividend_yield_pct"
    ranking_order: "descending"
    filters:
      dividend_yield_min: 2.0
      fcf_min: 100
    business_logic: |
      Identifies dividend-paying companies:
      - Dividend Yield > 2% (attractive income)
      - FCF > 0 (sustainable from cash generation)
      - Dividend Payout < 80% (room for growth & safety)

  debt_free_blue_chip:
    display_name: "Debt-Free Blue Chip"
    description: "Zero debt, strong ROE, large-cap established companies"
    target_count: "15-30 companies"
    ranking_metric: "return_on_equity_pct"
    ranking_order: "descending"
    filters:
      de_max: 0.0
      roe_min: 12
      market_cap_min: 5000
    business_logic: |
      Identifies fortress-like businesses:
      - D/E = 0 (zero financial leverage)
      - ROE > 12% (strong capital returns without debt)
      - Market Cap > ■5,000 Cr (large, established)

  turnaround_watch:
    display_name: "Turnaround Watch"
    description: "Recovery signals: growth acceleration, improving FCF, deleveraging"
    target_count: "5-15 companies"
    ranking_metric: "revenue_cagr_3yr"
    ranking_order: "descending"
    filters:
      revenue_cagr_5yr_min: 10
      fcf_min: 50  # Lower threshold - early stage recovery
    business_logic: |
      Identifies companies showing turnaround signals:
      - Revenue CAGR > 10% (growth re-acceleration)
      - FCF positive in latest year (cash generation improving)
      - D/E declining YoY (deleveraging trend)

# ============================================================================
# SPECIAL HANDLING RULES
# ============================================================================
special_rules:
  sector_carve_out:
    - sector: "Financials"
      logic: "Skip D/E filter for banks & NBFCs — use sector-relative D/E benchmarks"
      affected_filters: ["de_max"]
  
  debt_free_infinity:
    - metric: "interest_coverage"
      logic: "If ICR = None (debt-free company), treat as infinity and always pass ICR minimum"
      affected_filters: ["icr_min"]
  
  nan_handling:
    - logic: "If metric is NaN/None, exclude company from screener"
      severity: "EXCLUDE"

# ============================================================================
# OUTPUT FORMATTING
# ============================================================================
output:
  format: "Excel"
  filename: "screener_output.xlsx"
  sheets_per_preset: true
  columns_per_sheet:
    - "rank"
    - "company_id"
    - "company_name"
    - "sector"
    - "return_on_equity_pct"
    - "return_on_capital_employed_pct"
    - "net_profit_margin_pct"
    - "debt_to_equity"
    - "free_cash_flow_cr"
    - "fcf_cagr_5yr"
    - "revenue_cagr_5yr"
    - "pat_cagr_5yr"
    - "pe_ratio"
    - "pb_ratio"
    - "dividend_yield_pct"
    - "interest_coverage"
    - "market_cap_crore"
    - "asset_turnover"
    - "composite_quality_score"
    - "meets_all_filters"
  
  cell_formatting:
    header_fill: "D9E8F5"  # Light blue
    pass_fill: "C6EFCE"    # Light green
    fail_fill: "FFC7CE"    # Light red
    score_fill: "FFF2CC"   # Light yellow
    font: "Calibri"
    font_size: 11
